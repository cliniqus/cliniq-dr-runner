---
# ─────────────────────────────────────────────────────────────────────────────
# Data Fortress — Scheduled Verification (dr:check-all)
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs the full read-only verification pipeline daily at 06:00 UTC:
#   1. audit-live-firebase        — inventory Firestore collections
#   2. audit-live-cloudflare      — mirror R2 backup meta to docs/dr/
#   3. check-all                  — full DR integrity + retention checks
#   4. sync-dr-vault-to-r2        — ship fresh evidence to R2
#
# This refreshes the admin dashboard's evidence so indicators like
# "backup-coverage", "backup-freshness", "mirror-drift", etc. never
# go stale past their 26h threshold.
#
# Designed to run independently of `backup.yml` — if backup fails, this
# still runs and reports the degradation. If both run on the same day,
# `dr-checks` picks up the fresh `firebase/meta/last-backup.json` that
# `backup` just wrote.
#
# SAFETY profile identical to `backup.yml`:
#   - schedule + workflow_dispatch only
#   - contents:read permissions
#   - SHA-pinned actions
#   - secrets via env only
#   - --ignore-scripts on npm ci
# ─────────────────────────────────────────────────────────────────────────────

name: dr-checks

on:
  schedule:
    # 06:00 UTC daily — 4h after `backup.yml` completes, so the evidence
    # reflects the fresh backup rather than yesterday's state.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: dr-checks
  cancel-in-progress: true    # A newer run supersedes any in-flight one

permissions:
  contents: read

jobs:
  check-all:
    name: Verify all layers + sync vault
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLINIQ_SOURCE_ROOT: ${{ github.workspace }}/source-workspace
      CLINIQ_WORKSPACE_ROOT: ${{ github.workspace }}/source-workspace

    steps:
      - name: Checkout runner repo
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29  # v4.1.1
        with:
          persist-credentials: false

      - name: Clone private source
        env:
          CLONE_TOKEN: ${{ secrets.CLONE_TOKEN }}
          FIREBASE_APP_CLONE_TOKEN: ${{ secrets.FIREBASE_APP_CLONE_TOKEN }}
          FIREBASE_APP_DEPLOY_KEY: ${{ secrets.FIREBASE_APP_DEPLOY_KEY }}
          SRC_REPO: ${{ vars.SRC_REPO }}
          FIREBASE_APP_REPO: ${{ vars.FIREBASE_APP_REPO }}
        run: |
          set -euo pipefail
          if [[ -z "${CLONE_TOKEN:-}" ]]; then
            echo "::error::CLONE_TOKEN secret is not configured"; exit 1
          fi
          if [[ -z "${SRC_REPO:-}" ]]; then
            echo "::error::SRC_REPO repository variable is not configured (expected e.g. cliniqus/cliniq-website)"; exit 1
          fi
          FIREBASE_REPO="${FIREBASE_APP_REPO:-cliniqus/cliniq-app}"
          SOURCE_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          rm -rf "${CLINIQ_SOURCE_ROOT}"
          mkdir -p "${CLINIQ_SOURCE_ROOT}"

          setup_app_ssh() {
            if [[ -z "${FIREBASE_APP_DEPLOY_KEY:-}" ]]; then
              return 1
            fi

            mkdir -p "${HOME}/.ssh"
            chmod 700 "${HOME}/.ssh"
            printf '%s\n' "${FIREBASE_APP_DEPLOY_KEY}" > "${HOME}/.ssh/cliniq_app_deploy_key"
            chmod 600 "${HOME}/.ssh/cliniq_app_deploy_key"
            ssh-keyscan -H github.com >> "${HOME}/.ssh/known_hosts"
            eval "$(ssh-agent -s)" >/dev/null
            ssh-add "${HOME}/.ssh/cliniq_app_deploy_key" >/dev/null
            return 0
          }

          clone_repo_from_url() {
            local repo="$1"
            local dest="$2"
            local url="$3"
            if git ls-remote --exit-code --heads "${url}" "${SOURCE_REF}" >/dev/null 2>&1; then
              echo "Cloning ${repo}@${SOURCE_REF}"
              git clone --depth=1 --no-tags --branch "${SOURCE_REF}" "${url}" "${dest}"
            else
              echo "::warning::${repo} has no branch ${SOURCE_REF}; cloning default branch"
              git clone --depth=1 --no-tags "${url}" "${dest}"
            fi
          }

          WEBSITE_URL="https://x-access-token:${CLONE_TOKEN}@github.com/${SRC_REPO}.git"
          if setup_app_ssh; then
            FIREBASE_URL="git@github.com:${FIREBASE_REPO}.git"
          elif [[ -n "${FIREBASE_APP_CLONE_TOKEN:-}" ]]; then
            FIREBASE_URL="https://x-access-token:${FIREBASE_APP_CLONE_TOKEN}@github.com/${FIREBASE_REPO}.git"
          else
            FIREBASE_URL="https://x-access-token:${CLONE_TOKEN}@github.com/${FIREBASE_REPO}.git"
          fi

          clone_repo_from_url "${SRC_REPO}" "${CLINIQ_SOURCE_ROOT}/cliniq-website" "${WEBSITE_URL}"
          clone_repo_from_url "${FIREBASE_REPO}" "${CLINIQ_SOURCE_ROOT}/cliniq" "${FIREBASE_URL}"
          test -f "${CLINIQ_SOURCE_ROOT}/cliniq-website/package-lock.json"
          test -f "${CLINIQ_SOURCE_ROOT}/cliniq/firebase.json"
          test -f "${CLINIQ_SOURCE_ROOT}/cliniq/firestore.rules"
          test -f "${CLINIQ_SOURCE_ROOT}/cliniq/firestore.indexes.json"
          test -f "${CLINIQ_SOURCE_ROOT}/cliniq/storage.rules"
          echo "Website clone: $(git -C "${CLINIQ_SOURCE_ROOT}/cliniq-website" rev-parse --short HEAD)"
          echo "Firebase app clone: $(git -C "${CLINIQ_SOURCE_ROOT}/cliniq" rev-parse --short HEAD)"

      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.0.1
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source-workspace/cliniq-website/package-lock.json

      - name: Install dependencies (no scripts)
        working-directory: source-workspace/cliniq-website
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run full verification pipeline
        id: verify
        working-directory: source-workspace/cliniq-website
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          FIREBASE_MIRROR_REGISTRY_JSON: ${{ secrets.FIREBASE_MIRROR_REGISTRY_JSON }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_BACKUP_ENDPOINT: ${{ secrets.R2_BACKUP_ENDPOINT }}
          R2_BACKUP_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          R2_BACKUP_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_BACKUP_BUCKET_NAME: ${{ vars.R2_BACKUP_BUCKET_NAME }}
          CLINIQ_BACKUP_VAULT_ROOT: ${{ runner.temp }}/dr-vault
          CLINIQ_WORKSPACE_ROOT: ${{ github.workspace }}/source-workspace
        run: |
          set +e
          mkdir -p "${CLINIQ_BACKUP_VAULT_ROOT}"

          # Audit live firebase — writes firebase-live-inventory.json
          # into the vault. Exit code 1 is acceptable (e.g. Cloud
          # Functions diff) — downstream checks handle stale inputs
          # explicitly.
          npm run dr:audit-firebase || echo "::warning::dr:audit-firebase exit != 0 (non-fatal)"

          # Audit live cloudflare — writes docs/dr/latest-cloud-backup.json
          # (reads from the same location check-backup-* uses).
          # Non-fatal: token may lack Zone:Read.
          npm run dr:audit-cloudflare || echo "::warning::audit-cloudflare failed (token may lack Zone:Read); continuing"

          # Run every independent DR check, including retention and legacy-name
          # guardrails. Records per-check verdict.
          npm run dr:check-all
          CHECK_CODE=$?

          AGG="unknown"
          if [[ -f "${CLINIQ_BACKUP_VAULT_ROOT}/verification/check-all.json" ]]; then
            AGG=$(jq -r '.aggregate // "unknown"' "${CLINIQ_BACKUP_VAULT_ROOT}/verification/check-all.json")
          fi
          echo "aggregate=${AGG}" >> "$GITHUB_OUTPUT"
          echo "check_code=${CHECK_CODE}" >> "$GITHUB_OUTPUT"

          # Capture the per-check verdicts for the notification embed
          {
            echo 'summary<<EOF'
            jq -r '.results[] | "- \(.id): \(.status)"' \
              "${CLINIQ_BACKUP_VAULT_ROOT}/verification/check-all.json" 2>/dev/null || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Aggregate: ${AGG}"
          if [[ "${AGG}" == "fail" || "${AGG}" == "unknown" || ( "${CHECK_CODE}" != "0" && "${AGG}" != "warn" ) ]]; then
            echo "::error::DR aggregate is FAIL — immediate attention required"
          fi
          if [[ "${AGG}" == "warn" ]]; then
            echo "::warning::DR aggregate is WARN — investigate when convenient"
          fi
          exit 0

      - name: Sync DR vault to R2
        if: always() && steps.verify.outcome != 'skipped'
        working-directory: source-workspace/cliniq-website
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_BACKUP_ENDPOINT: ${{ secrets.R2_BACKUP_ENDPOINT }}
          R2_BACKUP_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          R2_BACKUP_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_BACKUP_BUCKET_NAME: ${{ vars.R2_BACKUP_BUCKET_NAME }}
          CLINIQ_BACKUP_VAULT_ROOT: ${{ runner.temp }}/dr-vault
        run: npx tsx scripts/dr/sync-dr-vault-to-r2.ts --apply

      - name: Fail job on hard DR failure
        if: always() && (steps.verify.outputs.aggregate == 'fail' || steps.verify.outputs.aggregate == 'unknown' || (steps.verify.outputs.check_code != '0' && steps.verify.outputs.aggregate != 'warn'))
        run: exit 1

      - name: Emit audit record
        if: always()
        env:
          AGG: ${{ steps.verify.outputs.aggregate }}
          RESULT: ${{ job.status }}
        run: |
          printf 'DR_AUDIT %s\n' "$(jq -nc \
            --arg runId   "${{ github.run_id }}" \
            --arg actor   "${{ github.actor }}" \
            --arg event   "${{ github.event_name }}" \
            --arg sha     "${{ github.sha }}" \
            --arg ts      "$(date -u -Iseconds)" \
            --arg workflow "dr-checks" \
            --arg agg     "${AGG:-unknown}" \
            --arg result  "${RESULT}" \
            '{workflow:$workflow, runId:$runId, actor:$actor, event:$event, sha:$sha, ts:$ts, aggregate:$agg, result:$result}')"

      - name: Scrub workspace
        if: always()
        run: rm -rf "${CLINIQ_SOURCE_ROOT}" "${RUNNER_TEMP}/dr-vault" || true

      - name: Notify Discord on degradation
        # Only fire on failure or warn — success is silent to reduce noise.
        if: always() && (job.status != 'success' || steps.verify.outputs.aggregate == 'warn') && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          AGG: ${{ steps.verify.outputs.aggregate }}
          SUMMARY: ${{ steps.verify.outputs.summary }}
        run: |
          set +e
          if [[ "${STATUS}" == "success" ]]; then
            EMOJI="⚠️"; COLOR=16776960
          else
            EMOJI="🚨"; COLOR=15158332
          fi
          PAYLOAD=$(jq -nc \
            --arg title "${EMOJI} DR checks — aggregate: ${AGG:-unknown}" \
            --arg desc  "${SUMMARY}" \
            --arg url   "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson color "${COLOR}" \
            '{embeds:[{title:$title, description:$desc, url:$url, color:$color}]}')
          curl -sS -H 'Content-Type: application/json' \
            -d "${PAYLOAD}" \
            "${DISCORD_WEBHOOK_URL}" >/dev/null || true

      - name: Notify Telegram on degradation
        if: always() && (job.status != 'success' || steps.verify.outputs.aggregate == 'warn') && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          AGG: ${{ steps.verify.outputs.aggregate }}
        run: |
          set +e
          if [[ "${STATUS}" == "success" ]]; then
            EMOJI="⚠️"
          else
            EMOJI="🚨"
          fi
          MSG="${EMOJI} DR checks — aggregate: ${AGG:-unknown}%0A%0AStatus: ${STATUS}%0AURL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" >/dev/null || true
