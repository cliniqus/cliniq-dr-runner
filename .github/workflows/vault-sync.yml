---
# ─────────────────────────────────────────────────────────────────────────────
# Data Fortress — Nightly Vault Sync
# ─────────────────────────────────────────────────────────────────────────────
#
# Lightweight sanity job that runs every night at 03:00 UTC — 1h after
# the backup completes and 3h before the verification run. Its only
# purpose is to guarantee that whatever is in the local-on-runner DR
# vault is flushed to R2.
#
# This is normally a no-op: the `backup.yml` workflow already syncs the
# vault at end-of-run. But if an operator triggered an ad-hoc local
# `dr:check-all` without syncing, or if the backup job was interrupted
# after writing artifacts but before syncing, this nightly job acts as
# a safety net.
#
# Fast: typical run < 1 min.
# ─────────────────────────────────────────────────────────────────────────────

name: vault-sync

on:
  schedule:
    - cron: '0 3 * * *'     # 03:00 UTC — 1h after backup starts
  workflow_dispatch: {}

concurrency:
  group: vault-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: Sync DR vault to R2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout runner repo
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29  # v4.1.1
        with:
          persist-credentials: false

      - name: Clone private source
        env:
          CLONE_TOKEN: ${{ secrets.CLONE_TOKEN }}
          SRC_REPO: ${{ vars.SRC_REPO }}
        run: |
          set -euo pipefail
          if [[ -z "${CLONE_TOKEN:-}" ]]; then
            echo "::error::CLONE_TOKEN secret is not configured"; exit 1
          fi
          git clone --depth=1 --no-tags \
            "https://x-access-token:${CLONE_TOKEN}@github.com/${SRC_REPO}.git" \
            src

      - name: Setup Node 20
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4.0.1
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies (no scripts)
        working-directory: src
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Regenerate fresh vault snapshot
        working-directory: src
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_BACKUP_ENDPOINT: ${{ secrets.R2_BACKUP_ENDPOINT }}
          R2_BACKUP_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          R2_BACKUP_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_BACKUP_BUCKET_NAME: ${{ vars.R2_BACKUP_BUCKET_NAME }}
          CLINIQ_BACKUP_VAULT_ROOT: ${{ runner.temp }}/dr-vault
        run: |
          set -euo pipefail
          mkdir -p "${CLINIQ_BACKUP_VAULT_ROOT}"
          # Fast: only audit-cloudflare (no Firestore reads needed)
          # just to keep the docs/dr/latest-cloud-backup.json mirror fresh.
          npm run dr:audit-cloudflare

      - name: Sync vault to R2
        working-directory: src
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          CLINIQ_BACKUP_VAULT_ROOT: ${{ runner.temp }}/dr-vault
        run: npx tsx scripts/dr/sync-dr-vault-to-r2.ts --apply

      - name: Emit audit record
        if: always()
        env:
          RESULT: ${{ job.status }}
        run: |
          printf 'DR_AUDIT %s\n' "$(jq -nc \
            --arg workflow "vault-sync" \
            --arg runId   "${{ github.run_id }}" \
            --arg actor   "${{ github.actor }}" \
            --arg event   "${{ github.event_name }}" \
            --arg ts      "$(date -u -Iseconds)" \
            --arg result  "${RESULT}" \
            '{workflow:$workflow, runId:$runId, actor:$actor, event:$event, ts:$ts, result:$result}')"

      - name: Scrub workspace
        if: always()
        run: rm -rf src "${RUNNER_TEMP}/dr-vault" || true
